name: edu_stream_starter
description: Netflix-style educational app starter with subscriptions, quizzes, PDFs, and device limits.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^2.31.0
  firebase_auth: ^4.19.5
  cloud_firestore: ^4.17.3
  firebase_storage: ^11.7.5
  youtube_player_flutter: ^9.0.1
  device_info_plus: ^10.1.0
 syncfusion_flutter_pdfviewer: ^27.2.5
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/pdfs/
